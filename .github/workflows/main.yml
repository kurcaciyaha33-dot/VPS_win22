name: VPS Windows 2022 by Redz

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Mengaktifkan Akses RDP (Remote Desktop)
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: Membuat User dan Password VPS
        shell: powershell
        run: |
          $Password = ConvertTo-SecureString "P@ssword1" -AsPlainText -Force
          New-LocalUser "Redz" -Password $Password -Description "VPS Admin"
          Add-LocalGroupMember -Group "Administrators" -Member "Redz"

      - name: Mengubah Tema ke Mode Light (Terang)
        shell: powershell
        run: |
          # Mengatur Light Mode untuk Aplikasi dan Sistem Windows
          $RegistryPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize"
          if (-not (Test-Path $RegistryPath)) { New-Item -Path $RegistryPath -Force }
          Set-ItemProperty -Path $RegistryPath -Name "AppsUseLightTheme" -Value 1 -Force
          Set-ItemProperty -Path $RegistryPath -Name "SystemUsesLightTheme" -Value 1 -Force

      - name: Mengunduh dan Menginstal Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/qn" -Wait

      - name: Establish Tailscale Connection
        shell: powershell
        run: |
          # Menjalankan Tailscale up tanpa authkey. 
          # Tailscale akan memunculkan URL Login di log GitHub Actions, silakan klik URL tersebut untuk otentikasi.
          Start-Process -FilePath "$env:ProgramFiles\Tailscale\tailscale.exe" -ArgumentList "up --hostname=VPS2022-$env:GITHUB_RUN_ID --unattended"
          
          Write-Host "==========================================================================" -ForegroundColor Yellow
          Write-Host "PERHATIAN: Silakan cek log di atas atau di bawah untuk menemukan URL login Tailscale." -ForegroundColor Yellow
          Write-Host "Klik link tersebut dan masuk ke akun Tailscale Anda untuk mengizinkan koneksi VPS." -ForegroundColor Yellow
          Write-Host "==========================================================================" -ForegroundColor Yellow

          # Menunggu hingga IP Tailscale didapatkan setelah user melakukan login web
          $tsIP = $null
          $retries = 0
          # Memberikan waktu tunggu lebih lama (300 detik / 5 menit) agar Anda sempat mengklik link login web
          while (-not $tsIP -and $retries -lt 60) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              if ($tsIP) { 
                  $tsIP = $tsIP.Trim() 
              } else {
                  Start-Sleep -Seconds 5
                  $retries++
              }
          }
          
          if (-not $tsIP) {
              Write-Error "Gagal mendapatkan IP Tailscale. Pastikan Anda sudah klik link login web sebelum batas waktu."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Menampilkan Informasi Login VPS
        shell: powershell
        run: |
          $IP = $env:TAILSCALE_IP
          
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " ______________________________________ " -ForegroundColor Green
          Write-Host "|                                      |" -ForegroundColor Green
          Write-Host "|  IP   : $IP"                           -ForegroundColor Green
          Write-Host "|  USER : Redz                         |" -ForegroundColor Green
          Write-Host "|  PASS : P@ssword1                    |" -ForegroundColor Green
          Write-Host "|______________________________________|" -ForegroundColor Green
          Write-Host "==========================================" -ForegroundColor Cyan

      - name: Menjaga VPS Tetap Aktif (6 Jam)
        shell: powershell
        run: |
          $seconds = 21600
          while ($seconds -gt 0) {
              Write-Host "VPS Windows 2022 Berhasil Terhubung ke Tailnet!"
              Write-Host "Nama Perangkat: VPS2022"
              Write-Host "Mode: Light Mode (Tema Terang)"
              Write-Host "Dibuat Oleh TT : @lah.katagwehmah (Redz/SiGanteng)"
              Write-Host "Sisa waktu masa aktif runner: $seconds detik"
              Write-Host "------------------------------------------------"
              Start-Sleep -Seconds 60
              $seconds -= 60
          }
